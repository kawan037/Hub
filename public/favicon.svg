<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0e172e" />
      <stop offset="100%" stop-color="#030305" />
    </radialGradient>

    <!-- Glowing Blue Neon Gradient -->
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <!-- Outer Glow Filter -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="ring-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clipping path for 3D Orbit Illusion (Draws front-right part of ellipse on top) -->
    <clipPath id="front-orbit-clip">
      <rect x="230" y="150" width="282" height="300" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGlow)" />

  <!-- Outer Ring (Back Half & Full Ring background glow) -->
  <ellipse cx="256" cy="270" rx="215" ry="72" fill="none" stroke="url(#neonBlue)" stroke-width="14" transform="rotate(-18 256 270)" filter="url(#ring-glow)" />

  <!-- 3D Letter C - Deep Extrusion Base -->
  <g transform="translate(0, 5)">
    <!-- Cyan glow/shadow -->
    <text x="256" y="360" font-family="'Space Grotesk', 'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="310" fill="#0033aa" text-anchor="middle" filter="url(#neon-glow)" opacity="0.9">C</text>
    
    <!-- 3D Extrusion Side Layers -->
    <text x="256" y="356" font-family="'Space Grotesk', 'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="310" fill="#002288" text-anchor="middle">C</text>
    <text x="256" y="352" font-family="'Space Grotesk', 'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="310" fill="#0044cc" text-anchor="middle">C</text>
    <text x="256" y="348" font-family="'Space Grotesk', 'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="310" fill="#0066ff" text-anchor="middle">C</text>
    <text x="256" y="344" font-family="'Space Grotesk', 'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="310" fill="#00ccff" text-anchor="middle">C</text>
    
    <!-- Top White Face -->
    <text x="256" y="340" font-family="'Space Grotesk', 'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="310" fill="#ffffff" stroke="#22d3ee" stroke-width="4" text-anchor="middle">C</text>
  </g>

  <!-- Front Half of the Ring (Overlaid to create 3D Orbit depth) -->
  <g clip-path="url(#front-orbit-clip)">
    <ellipse cx="256" cy="270" rx="215" ry="72" fill="none" stroke="url(#neonBlue)" stroke-width="14" transform="rotate(-18 256 270)" filter="url(#ring-glow)" />
  </g>
</svg>
